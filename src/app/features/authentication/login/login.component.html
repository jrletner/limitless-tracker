<div>
    <input
        [(ngModel)]="username"
        placeholder="Username"
    >
    <input
        [(ngModel)]="password"
        placeholder="Password"
        type="password"
    >
    <button (click)="login()">Login</button>
    <p *ngIf="isAuth">Welcome, {{loggedInUsername}}</p>
    <p *ngIf="!isAuth">You are not logged in.</p>
</div>
